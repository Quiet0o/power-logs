services:
  app-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - PORT=3000
      - HOST=0.0.0.0
      - DATABASE_URL=/app/data/sqlite.db
    volumes:
      - .:/app
      - /app/node_modules
      - db-data-dev:/app/data
    command: sh -c "npm run db:push && npm run dev -- --host 0.0.0.0"
    restart: unless-stopped

volumes:
  db-data-dev:
